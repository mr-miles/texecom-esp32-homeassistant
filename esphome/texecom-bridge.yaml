# Texecom Premier 24 -> TCP bridge on an M5Stack Atom S3.
#
# Plan 01-02 deliverable. Run with:
#     esphome run esphome/texecom-bridge.yaml
#
# Pin and UART spec are LOCKED by Plan 01-01 (hardware bring-up):
#   * tx_pin: GPIO5 (Atom S3 -> panel)
#   * rx_pin: GPIO6 (panel -> Atom S3)
#   * 19200 8N2 — Wintex framing depends on the second stop bit.
# Do NOT change these here without also updating
# .planning/hardware/phase-1-wiring.md.

esphome:
  name: texecom-bridge
  friendly_name: Texecom Bridge
  # No third-party libraries needed — the texecom component uses
  # ESPHome's native `socket` API for TCP listening (see
  # components/texecom/texecom.cpp). The previous TCP-library
  # dependency was removed because the upstream forks kept breaking
  # across Arduino-ESP32 revisions.

esp32:
  board: m5stack-atoms3
  framework:
    type: arduino

# Register the local external_components directory so ESPHome picks up
# `components/texecom/` as the `texecom:` platform. The path is relative
# to this YAML file, then we walk up to the repo root.
external_components:
  - source:
      type: local
      path: ../components
    components: [texecom]

logger:
  # USB-CDC console, NOT the panel UART.
  baud_rate: 115200
  level: INFO
  # Hide the panel UART from the logger — it is raw binary and would
  # otherwise flood the log. Comment these out when debugging.
  logs:
    uart: WARN

# Plan 02-01: serve captured Wintex sessions over HTTP for download.
# LAN-only deployment — auth deliberately disabled (matches the security
# posture of the unauthenticated TCP bridge on port 10001).
#
# After a Wintex session, browse to:
#   http://<device-ip>/                      — landing page
#   http://<device-ip>/file?file=/captures/  — directory listing of captures
#   http://<device-ip>/file?file=/captures/wintex-XXXX-001.bin  — download
#   http://<device-ip>/file?file=/captures/wintex-XXXX-001.txt  — hex dump
# (web_server v3 also exposes a built-in /local/ tree if compiled with
# include_internal — fall back to /file?file= for portability.)
web_server:
  port: 80
  version: 3
  local: false

api:
  encryption:
    key: !secret api_encryption_key

# Phase 1.5 — MQTT bring-up.
# This block ships ahead of any Texecom-decoded panel data so we can prove
# the broker/network/HA-discovery integration end-to-end using only ESPHome
# built-ins. Phase 3 will later layer decoded panel sensors on top of this
# same topic taxonomy. Birth/will messages drive HA's availability state for
# every entity attached to this device.
mqtt:
  broker: !secret mqtt_broker_host
  username: !secret mqtt_broker_username
  password: !secret mqtt_broker_password
  # Default port 1883; bump only if the user runs Mosquitto elsewhere.
  # Discovery is enabled by default — entities auto-appear in HA.
  topic_prefix: texecom-bridge
  birth_message:
    topic: texecom-bridge/status
    payload: online
    retain: true
  will_message:
    topic: texecom-bridge/status
    payload: offline
    retain: true
  # Phase 3 will add Texecom-decoded sensors here. Phase 1.5 only carries
  # device-health entities, declared in the binary_sensor: and sensor:
  # blocks below.

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # First-boot captive portal fallback.
  ap:
    ssid: "Texecom-Bridge Fallback"
    password: !secret ota_password

captive_portal:

# Panel UART on the locked pins.
uart:
  id: panel_uart
  tx_pin: GPIO5
  rx_pin: GPIO6
  baud_rate: 19200
  data_bits: 8
  parity: NONE
  stop_bits: 2
  rx_buffer_size: 1024

# The TCP<->UART bridge.
#
# Capture options (Plan 02-01):
#   record_when:           bridge | monitor | both | none   (default: bridge)
#   capture_max_file_bytes: rotate at this size in bytes    (default: 262144)
#   capture_root:           LittleFS directory for files    (default: /captures)
texecom:
  id: panel_bridge
  uart_id: panel_uart
  tcp_port: 10001
  record_when: bridge
  capture_max_file_bytes: 262144
  capture_root: "/captures"

# Phase 1.5 device-health entities. These are independent of any panel
# data — they exercise the MQTT discovery path end-to-end so Phase 3 can
# build on a known-good integration. Each entity carries a "Texecom Bridge"
# prefix so HA derives predictable entity_ids
# (binary_sensor.texecom_bridge_status, sensor.texecom_bridge_cpu_temperature,
# sensor.texecom_bridge_wifi_signal).
binary_sensor:
  - platform: template
    name: "Texecom Bridge Status"
    id: bridge_status
    device_class: connectivity
    # ESPHome's mqtt component automatically publishes the device's
    # availability via the topic_prefix/status pattern. The HA-side
    # discovery message ties this entity to the same availability
    # topic, so the entity goes "unavailable" when the will message
    # fires.
    lambda: |-
      return true;

sensor:
  - platform: internal_temperature
    name: "Texecom Bridge CPU Temperature"
    id: bridge_cpu_temp
    update_interval: 60s

  - platform: wifi_signal
    name: "Texecom Bridge WiFi Signal"
    id: bridge_wifi_signal
    update_interval: 60s

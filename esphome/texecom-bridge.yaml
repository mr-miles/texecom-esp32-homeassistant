# Texecom Premier 24 -> TCP bridge on an M5Stack Atom S3.
#
# Plan 01-02 deliverable. Run with:
#     esphome run esphome/texecom-bridge.yaml
#
# Pin and UART spec are LOCKED by Plan 01-01 (hardware bring-up):
#   * tx_pin: GPIO5 (Atom S3 -> panel)
#   * rx_pin: GPIO6 (panel -> Atom S3)
#   * 19200 8N2 — Wintex framing depends on the second stop bit.
# Do NOT change these here without also updating
# .planning/hardware/phase-1-wiring.md.

# Tunable defaults. Override here (or via an ESPHome `packages:` wrapper)
# to change the MQTT broker port or the root topic namespace without
# editing the rest of the file. Substitutions are always strings; ESPHome
# coerces ${mqtt_port} to an integer where the schema requires it.
#
# `device_id` is a random 8-char hex identifier (0-9, a-f) baked into:
#   * the mDNS hostname        (texecom-bridge-${device_id}.local)
#   * the friendly name in HA  ("Texecom Bridge ${device_id}")
#   * the MQTT topic subtree   (${mqtt_base_topic}/${device_id}/...)
# Regenerate per-device when flashing a second bridge so neither mDNS
# nor MQTT topics collide. Hex avoids l/1/I and o/0/O ambiguity. Generate
# with:
#     python -c "import secrets; print(secrets.token_hex(4))"
substitutions:
  device_id: "2f7dc4b9"
  mqtt_port: "1883"
  mqtt_base_topic: "Texecom"

esphome:
  name: texecom-bridge-${device_id}
  friendly_name: "Texecom Bridge ${device_id}"
  # No third-party libraries needed — the texecom component uses
  # ESPHome's native `socket` API for TCP listening (see
  # components/texecom/texecom.cpp). The previous TCP-library
  # dependency was removed because the upstream forks kept breaking
  # across Arduino-ESP32 revisions.
  #
  # Suppress Arduino-ESP32 core debug logging. Smaller binary, less
  # serial chatter — ESPHome's own logger: still emits at the level
  # configured below, so visibility into our code is unaffected.
  platformio_options:
    build_flags:
      - -DCORE_DEBUG_LEVEL=0

esp32:
  board: m5stack-atoms3
  framework:
    type: arduino

# Register the local external_components directory so ESPHome picks up
# `components/texecom/` as the `texecom:` platform. The path is relative
# to this YAML file, then we walk up to the repo root.
external_components:
  - source:
      type: local
      path: ../components
    components: [texecom]

logger:
  # USB-CDC console, NOT the panel UART.
  baud_rate: 115200
  level: INFO
  # Hide the panel UART from the logger — it is raw binary and would
  # otherwise flood the log. Comment these out when debugging.
  logs:
    uart: WARN

# Web dashboard for browser-based diagnostics:
#   * Entity states + live updates
#   * Logs tab — including the boot-time dump_config() (handy for
#     confirming what configuration the device is actually running)
#   * Phase-2 follow-up will add a /captures/ route here that lists
#     and serves the on-device Wintex capture files
# `local: false` keeps JS/CSS on a CDN so the binary stays small
# (~30-50 KB saved over `local: true`).
web_server:
  port: 80
  version: 3
  local: false

# NOTE — `api:` (ESPHome Native API) was deliberately removed. HA
# integration goes via MQTT (REQ-005, Phase 1.5+). Re-add the api:
# block + api_encryption_key secret if you ever want HA's ESPHome
# integration to talk to this device directly.
#
# Phase 1.5 — MQTT bring-up.
# This block ships ahead of any Texecom-decoded panel data so we can prove
# the broker/network/HA-discovery integration end-to-end using only ESPHome
# built-ins. Phase 3 will later layer decoded panel sensors on top of this
# same topic taxonomy. Birth/will messages drive HA's availability state for
# every entity attached to this device.
mqtt:
  broker: !secret mqtt_broker_host
  port: ${mqtt_port}
  username: !secret mqtt_broker_username
  password: !secret mqtt_broker_password
  # topic_prefix is the root namespace for every MQTT topic this device
  # publishes (and the prefix HA's discovery messages reference). Default
  # "Texecom" — overridable via the substitution at the top of this file.
  # Discovery is enabled by default — entities auto-appear in HA.
  topic_prefix: ${mqtt_base_topic}/${device_id}
  birth_message:
    topic: ${mqtt_base_topic}/${device_id}/status
    payload: online
    retain: true
  will_message:
    topic: ${mqtt_base_topic}/${device_id}/status
    payload: offline
    retain: true
  # Phase 3 will add Texecom-decoded sensors here. Phase 1.5 only carries
  # device-health entities, declared in the binary_sensor: and sensor:
  # blocks below.

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # First-boot captive portal fallback.
  ap:
    ssid: "Texecom Premier Bridge"
    password: !secret ota_password

captive_portal:

# Panel UART on the locked pins.
uart:
  id: panel_uart
  tx_pin: GPIO5
  rx_pin: GPIO6
  baud_rate: 19200
  data_bits: 8
  parity: NONE
  stop_bits: 2
  rx_buffer_size: 1024

# The TCP<->UART bridge.
#
# Capture options (Plan 02-01):
#   record_when:           bridge | monitor | both | none  (default: bridge)
#   capture_max_ram_bytes: total RAM budget across stored captures
#                                                          (default: 131072)
# Captures live in heap RAM only — no LittleFS persistence in this build.
# Download via http://<device>/captures/ before rebooting.
texecom:
  id: panel_bridge
  uart_id: panel_uart
  tcp_port: 10001
  record_when: bridge
  capture_max_ram_bytes: 131072

# Phase 1.5 device-health entities. These are independent of any panel
# data — they exercise the MQTT discovery path end-to-end so Phase 3 can
# build on a known-good integration. Each entity carries a "Texecom Bridge"
# prefix so HA derives predictable entity_ids
# (binary_sensor.texecom_bridge_status, sensor.texecom_bridge_cpu_temperature,
# sensor.texecom_bridge_wifi_signal).
binary_sensor:
  - platform: template
    name: "Bridge Status"
    id: bridge_status
    device_class: connectivity
    # ESPHome's mqtt component automatically publishes the device's
    # availability via the topic_prefix/status pattern. The HA-side
    # discovery message ties this entity to the same availability
    # topic, so the entity goes "unavailable" when the will message
    # fires.
    lambda: |-
      return true;

sensor:
  - platform: internal_temperature
    name: "Bridge CPU Temperature"
    id: bridge_cpu_temp
    update_interval: 60s

  - platform: wifi_signal
    name: "Bridge WiFi Signal"
    id: bridge_wifi_signal
    update_interval: 60s
